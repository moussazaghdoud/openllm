# SecureLLM NATS Server Configuration
# Deployed on Railway — accepts leaf node connections from on-premise engines

server_name: "securellm-hub"

# Internal NATS port (securellm app connects here)
listen: "0.0.0.0:4222"

# JetStream (persistent messaging)
jetstream {
  max_mem: 256MB
  max_file: 1GB
}

# WebSocket listener (on-premise leaf nodes connect here)
websocket {
  listen: "0.0.0.0:8443"
  no_tls: true  # Railway handles TLS termination
}

# Leaf node connections (on-premise NATS instances connect as leaves)
leafnodes {
  listen: "0.0.0.0:7422"

  authorization {
    # On-premise leaf nodes must provide this token
    # Override with NATS_LEAFNODE_TOKEN env var at deploy time
    token: "LEAFNODE_TOKEN_PLACEHOLDER"
  }
}

# Internal auth (securellm app connects with this token)
authorization {
  token: "INTERNAL_TOKEN_PLACEHOLDER"
}

# Monitoring
http_port: 8222

# Logging
logtime: true
debug: false
trace: false

# Limits
max_payload: 8MB
max_connections: 1000
