services:
  securellm:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_SECRET_KEY=dev-secret-key
      - ADMIN_API_KEY=dev-admin-key
      - NATS_ENABLED=true
      - NATS_URL=nats://nats:4222
      - NATS_TOKEN=dev-internal-token
    depends_on:
      - redis
      - nats

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    build: ./nats
    ports:
      - "4222:4222"
      - "7422:7422"
      - "8222:8222"
      - "8443:8443"
    environment:
      - NATS_LEAFNODE_TOKEN=dev-leafnode-token
      - NATS_INTERNAL_TOKEN=dev-internal-token
